name: InputLock

options:
  bundleIdPrefix: com.local
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  SWIFT_VERSION: "6.0"
  MACOSX_DEPLOYMENT_TARGET: "13.0"
  PRODUCT_BUNDLE_IDENTIFIER: com.local.inputlock
  PRODUCT_NAME: InputLock
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
  # 关闭沙盒，允许使用 Carbon TIS API
  ENABLE_APP_SANDBOX: NO
  # 代码签名（本地测试用）
  CODE_SIGN_IDENTITY: "-"
  CODE_SIGN_STYLE: Manual
  # 不需要开发者账号也可运行
  DEVELOPMENT_TEAM: ""

targets:
  InputLock:
    type: application
    platform: macOS
    sources:
      - path: Sources/InputLock
        excludes:
          - "**/.*"
    resources:
      - path: Resources/Info.plist
    info:
      path: Resources/Info.plist
    entitlements:
      path: Resources/InputLock.entitlements
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/InputLock.entitlements
    dependencies:
      - sdk: Carbon.framework
      - sdk: ServiceManagement.framework
    scheme:
      environmentVariables:
        OS_ACTIVITY_MODE: disable

schemes:
  InputLock:
    build:
      targets:
        InputLock: all
    run:
      config: Debug
    archive:
      config: Release
