name: InputLock

options:
  bundleIdPrefix: com.local
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.local.inputlock
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_APP_SANDBOX: NO
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""

targets:
  InputLock:
    type: application
    platform: macOS
    sources:
      - path: Sources/InputLock
        type: group
        includes:
          - "*.swift"
    info:
      path: Resources/Info.plist
    entitlements:
      path: Resources/InputLock.entitlements
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/InputLock.entitlements
    dependencies:
      - sdk: Carbon.framework
      - sdk: ServiceManagement.framework
    scheme:
      environmentVariables:
        OS_ACTIVITY_MODE: disable
