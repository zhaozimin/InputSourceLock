name: InputLock

options:
  bundleIdPrefix: com.local
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.local.inputlock
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_APP_SANDBOX: NO
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    # Xcode 推荐设置
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEAD_CODE_STRIPPING: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    GCC_NO_COMMON_BLOCKS: YES
    ENABLE_STRICT_OBJC_MSGSEND: YES
    CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: YES
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES

targets:
  InputLock:
    type: application
    platform: macOS
    sources:
      - path: Sources/InputLock
        type: group
        includes:
          - "*.swift"
    info:
      path: Resources/Info.plist
    resources:
      - path: Resources/AppIcon.icns
    entitlements:
      path: Resources/InputLock.entitlements
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/InputLock.entitlements
    dependencies:
      - sdk: Carbon.framework
      - sdk: ServiceManagement.framework
    scheme:
      environmentVariables:
        OS_ACTIVITY_MODE: disable
